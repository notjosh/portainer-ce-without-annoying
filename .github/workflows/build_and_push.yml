name: Build and push

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      rebuild:
        description: 'Set to "true" to force re-build last 5 tags'
        required: true
        type: choice
        options:
          - 'true'
          - 'false'
        default: 'false'
  schedule:
    - cron: '20 1 * * *'

permissions:
  contents: read
  packages: write

concurrency:
  group: build-and-push
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # exposes ACTIONS_RUNTIME_TOKEN etc. so --cache-from/to=type=gha works
      # from a raw `docker buildx build` in a run step
      - name: Expose GitHub runtime for buildx cache
        uses: crazy-max/ghaction-github-runtime@v4

      # installs the pnpm version pinned in package.json's packageManager field
      # (pinned at 11.11.0: 11.12.0 crashes the action's self-installer,
      # see pnpm/action-setup#276)
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push
        run: node scripts/ci_cd.js rebuild=${{ inputs.rebuild }}
