name: Cleanup untagged package versions

on:
  schedule:
    - cron: '40 3 * * 0'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Log what would be deleted without deleting'
        type: boolean
        default: false

permissions:
  packages: write

concurrency:
  group: ghcr-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      # multi-arch aware: keeps the untagged per-arch child manifests that
      # tagged image indexes reference, unlike actions/delete-package-versions
      - name: Delete untagged versions
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          delete-untagged: true
          validate: true
          dry-run: ${{ inputs.dry-run == true }}
